# Stack con PostgreSQL para auditoría de seguridad (tabla security_audit).
# Uso: docker compose -f docker-compose.corporate.yml up -d
# Primera vez: docker compose -f docker-compose.corporate.yml run --rm app npm run migrate

services:
  app:
    build: .
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL:-postgresql://pgc:pgc@postgres:5432/pgcontrol}
      LOG_HTTP: ${LOG_HTTP:-true}
    volumes:
      - pgcontrol-data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pgc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pgc}
      POSTGRES_DB: ${POSTGRES_DB:-pgcontrol}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgcontrol-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  pgcontrol-data:
  pgcontrol-pg:
